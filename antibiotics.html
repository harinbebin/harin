  <h1>항생제의 작용 원리</h1>

  <h2>1. 개념</h2>
  <p>
  항생제는 세균을 죽이거나 증식을 억제하는 약물이다.
  </p>

  <h2>2. 🔬 Mechanism</h2>
  <p>
  항생제는 세균의 세포벽 합성을 방해하거나 단백질 합성을 억제한다.
  세균은 세포벽이 없으면 생존할 수 없다.
  </p>

  <h2>3. 💊 수의학적 적용</h2>
  <p>
  반려견의 세균 감염 치료에 사용된다.
  </p>

  <h2>4. 🧠 나의 분석</h2>
  <p>
  항생제는 세균과 동물 세포의 구조 차이를 이용해
  선택적으로 작용한다는 점이 중요하다.
  </p>
