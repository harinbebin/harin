<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>소화와 장내 미생물</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="sub-page">

  <a href="index.html">← 메인으로 돌아가기</a>

  <div class="page-layout">

    <nav class="side-menu">
      <button onclick="showSection('concept')">개념</button>
      <button onclick="showSection('mechanism')">작용 기전</button>
      <button onclick="showSection('application')">수의학적 적용</button>
      <button onclick="showSection('analysis')">나의 분석</button>
    </nav>

    <div class="content">
      <h1>소화 과정과 장내 미생물</h1>

      <div id="concept" class="info-section">
        <h2>1. 개념</h2>
        <p>소화는 음식물 속 영양소를 몸이 흡수할 수 있는 작은 단위로 분해하는 과정이다.</p>
      </div>

      <div id="mechanism" class="info-section">
        <h2>2. 작용 기전</h2>
        <p>단백질은 아미노산으로, 지방은 지방산과 글리세롤로, 탄수화물은 포도당과 같은 단당류로 분해되어 흡수된다.</p>
      </div>

      <div id="application" class="info-section">
        <h2>3. 수의학적 적용</h2>
        <p>수의학에서는 설사, 소화 불량, 장내 균형 이상을 평가할 때 식이와 장내 미생물 상태를 함께 고려한다.</p>
      </div>

      <div id="analysis" class="info-section">
        <h2>4. 나의 분석</h2>
        <p>소화는 단순히 음식을 분해하는 과정이 아니라 장내 미생물과 면역 기능까지 연결되는 중요한 생리 과정이다.</p>
      </div>
    </div>

  </div>

  <script>
    function showSection(sectionId) {
      document.querySelectorAll('.info-section').forEach(section => {
        section.style.display = 'none';
      });
      document.getElementById(sectionId).style.display = 'block';
    }
    showSection('concept');
  </script>

</body>
</html>
