<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마취</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="sub-page">

  <a href="index.html">← 메인으로 돌아가기</a>

  <div class="page-layout">

    <nav class="side-menu">
      <button onclick="showSection('concept')">개념</button>
      <button onclick="showSection('mechanism')">작용 기전</button>
      <button onclick="showSection('application')">수의학적 적용</button>
      <button onclick="showSection('analysis')">나의 분석</button>
    </nav>

    <div class="content">
      <h1>마취와 신경 억제 작용</h1>

      <div id="concept" class="info-section">
        <h2>1. 개념</h2>
        <p>마취는 수술이나 처치 과정에서 통증을 줄이고 의식과 움직임을 조절하기 위해 사용하는 방법이다.</p>
      </div>

      <div id="mechanism" class="info-section">
        <h2>2. 작용 기전</h2>
        <p>마취제는 신경세포 사이의 신호 전달을 억제하여 통증 자극이 뇌로 전달되는 것을 줄인다.</p>
      </div>

      <div id="application" class="info-section">
        <h2>3. 수의학적 적용</h2>
        <p>수의학에서는 수술, 치과 처치, 영상 검사 등에서 마취가 사용된다. 동물이 안전하게 진료받기 위해 중요하다.</p>
      </div>

      <div id="analysis" class="info-section">
        <h2>4. 나의 분석</h2>
        <p>마취는 단순히 동물을 잠들게 하는 것이 아니라 통증 전달과 신경 반응을 조절하는 과학적 과정이라고 볼 수 있다.</p>
      </div>
    </div>

  </div>

  <script>
    function showSection(sectionId) {
      document.querySelectorAll('.info-section').forEach(section => {
        section.style.display = 'none';
      });
      document.getElementById(sectionId).style.display = 'block';
    }
    showSection('concept');
  </script>

</body>
</html>
